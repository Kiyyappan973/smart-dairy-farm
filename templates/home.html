<!DOCTYPE html>

<html>

<head>
    <title>Smart Dairy Farm</title>

```
<style>
    body{
        font-family:Arial;
        background:#f4fff4;
        margin:0;
        padding:0;
    }

    .navbar{
        background:#198754;
        color:white;
        padding:20px;
        font-size:30px;
        font-weight:bold;
    }

    .container{
        padding:30px;
    }

    .cards{
        display:flex;
        gap:20px;
        margin-bottom:30px;
    }

    .card{
        background:white;
        padding:20px;
        border-radius:10px;
        width:200px;
        box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    .buttons a{
        text-decoration:none;
        background:#198754;
        color:white;
        padding:10px 20px;
        border-radius:8px;
        margin-right:10px;
    }

    table{
        width:100%;
        border-collapse:collapse;
        margin-top:30px;
        background:white;
    }

    table th{
        background:#198754;
        color:white;
        padding:12px;
    }

    table td{
        padding:12px;
        text-align:center;
        border-bottom:1px solid #ddd;
    }

    img{
        border-radius:10px;
    }
</style>
```

</head>

<body>

<div class="navbar">
    🐄 Smart Dairy Farm
</div>

<div class="container">

```
<div class="cards">

    <div class="card">
        <h2>Total Cows</h2>
        <h1>{{ cows|length }}</h1>
    </div>

    <div class="card">
        <h2>Total Milk</h2>
        <h1>{{ total_milk }} L</h1>
    </div>

    <div class="card">
        <h2>Total Income</h2>
        <h1>₹ {{ total_income }}</h1>
    </div>

</div>

<div class="buttons">
    <a href="/addcow">Add Cow</a>
    <a href="/addmilk">Add Milk</a>
    <a href="/logout">Logout</a>
</div>

    {% for cow in cows %}

    <tr>

        <td>{{ cow.id }}</td>

        <td>{{ cow.name }}</td>

        <td>{{ cow.breed }}</td>

        <td>{{ cow.age }}</td>

        <td>
            <img src="{{ cow.image }}" width="80">
        </td>

    </tr>

    {% endfor %}

</table>
```

</div>

</body>

</html>
