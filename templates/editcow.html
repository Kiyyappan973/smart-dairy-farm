<!DOCTYPE html>
<html>

<head>

    <title>Edit Cow</title>

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

    <div class="table-box">

        <h1>Edit Cow ✏️</h1>

        <form action="/updatecow/{{ cow.id }}"

        method="POST">

            <input type="text"

            name="cowname"

            value="{{ cow.name }}"

            required>

            <br><br>

            <input type="text"

            name="breed"

            value="{{ cow.breed }}"

            required>

            <br><br>

            <input type="text"

            name="age"

            value="{{ cow.age }}"

            required>

            <br><br>

            <button type="submit">

                Update Cow

            </button>

        </form>

    </div>

</body>

</html>
